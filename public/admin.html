<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Messages</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #050812 100%);
      color: #e0e8f0;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(10, 14, 39, 0.8);
      border-radius: 15px;
      padding: 30px;
      border: 1px solid rgba(0, 102, 255, 0.2);
      box-shadow: 0 20px 60px rgba(0, 102, 255, 0.2);
    }

    h1 {
      color: #00ccff;
      margin-bottom: 30px;
      text-align: center;
      font-size: 2.5em;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: rgba(0, 102, 255, 0.1);
      padding: 20px;
      border-radius: 10px;
      border: 1px solid rgba(0, 102, 255, 0.2);
      text-align: center;
    }

    .stat-card h3 {
      color: #00ccff;
      font-size: 2.5em;
    }

    .stat-card p {
      color: #d4dce8;
      margin-top: 10px;
    }

    .messages-container {
      display: grid;
      gap: 20px;
    }

    .message-card {
      background: linear-gradient(135deg, rgba(16, 25, 61, 0.8) 0%, rgba(5, 8, 18, 0.8) 100%);
      padding: 20px;
      border-radius: 10px;
      border: 1px solid rgba(0, 102, 255, 0.2);
      transition: all 0.3s ease;
    }

    .message-card:hover {
      border-color: rgba(0, 204, 255, 0.4);
      box-shadow: 0 10px 30px rgba(0, 102, 255, 0.2);
    }

    .message-card h3 {
      color: #00ccff;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .message-text {
      color: #e0e8f0;
      line-height: 1.6;
      margin: 15px 0;
      padding: 15px;
      background: rgba(0, 0, 0, 0.3);
      border-left: 4px solid #00ccff;
      border-radius: 5px;
    }

    .message-time {
      color: #6b7280;
      font-size: 0.9em;
    }

    .no-messages {
      text-align: center;
      padding: 40px;
      color: #6b7280;
    }

    .refresh-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, #0066ff 0%, #00ccff 100%);
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
      float: right;
      margin-bottom: 20px;
    }

    .refresh-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(0, 204, 255, 0.5);
    }

    .download-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, #10b981 0%, #00ccff 100%);
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
      margin-right: 10px;
    }

    .download-btn:hover {
      transform: scale(1.05);
    }

    .delete-btn {
      padding: 5px 15px;
      background: #ff3366;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9em;
    }

    .delete-btn:hover {
      background: #ff1744;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📬 Eid Salami Messages</h1>
    
    <button class="refresh-btn" onclick="loadMessages()">🔄 Refresh</button>
    <button class="download-btn" onclick="downloadMessages()">⬇️ Download JSON</button>
    <button class="download-btn" onclick="downloadCSV()">📊 Download CSV</button>

    <div class="stats">
      <div class="stat-card">
        <h3 id="total-messages">0</h3>
        <p>Total Messages</p>
      </div>
    </div>

    <div class="messages-container" id="messages-container">
      <div class="no-messages">Loading messages...</div>
    </div>
  </div>

  <script>
    // Load messages on page load
    document.addEventListener('DOMContentLoaded', loadMessages);

    async function loadMessages() {
      try {
        const response = await fetch('/api/messages');
        const data = await response.json();

        if (data.success && data.messages.length > 0) {
          displayMessages(data.messages);
          document.getElementById('total-messages').textContent = data.count;
        } else {
          document.getElementById('messages-container').innerHTML = 
            '<div class="no-messages">No messages yet</div>';
          document.getElementById('total-messages').textContent = '0';
        }
      } catch (error) {
        console.error('Error loading messages:', error);
        document.getElementById('messages-container').innerHTML = 
          '<div class="no-messages">Error loading messages</div>';
      }
    }

    function displayMessages(messages) {
      const container = document.getElementById('messages-container');
      container.innerHTML = '';

      // Sort messages by newest first
      messages.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

      messages.forEach(msg => {
        const date = new Date(msg.timestamp);
        const formattedDate = date.toLocaleString();
        
        const card = document.createElement('div');
        card.className = 'message-card';
        card.innerHTML = `
          <h3>
            <span>${msg.name}</span>
            <button class="delete-btn" onclick="deleteMessage(${msg.id})">Delete</button>
          </h3>
          <div class="message-text">"${msg.message}"</div>
          <div class="message-time">📅 ${formattedDate}</div>
        `;
        container.appendChild(card);
      });
    }

    function downloadMessages() {
      fetch('/api/messages')
        .then(res => res.json())
        .then(data => {
          const json = JSON.stringify(data.messages, null, 2);
          const blob = new Blob([json], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `eid-messages-${new Date().toISOString().split('T')[0]}.json`;
          a.click();
        });
    }

    function downloadCSV() {
      fetch('/api/messages')
        .then(res => res.json())
        .then(data => {
          let csv = 'Name,Message,Date\n';
          data.messages.forEach(msg => {
            const date = new Date(msg.timestamp).toLocaleString();
            csv += `"${msg.name}","${msg.message}","${date}"\n`;
          });
          const blob = new Blob([csv], { type: 'text/csv' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `eid-messages-${new Date().toISOString().split('T')[0]}.csv`;
          a.click();
        });
    }

    function deleteMessage(id) {
      if (confirm('Are you sure you want to delete this message?')) {
        // Note: You'll need to add a DELETE endpoint in server.js for this to work
        alert('Delete functionality coming soon!');
      }
    }
  </script>
</body>
</html>
